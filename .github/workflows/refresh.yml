name: Daily Dashboard Refresh

on:
  # Runs every day at 7:00 AM UTC (adjust to your timezone)
  schedule:
    - cron: '0 7 * * *'

  # Also lets you trigger it manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out your repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3 — Install Python dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4 — Run the data fetch script
      # Uses secrets you set in GitHub repository settings
      - name: Fetch live data from Power BI
        env:
          PBI_TENANT_ID:     ${{ secrets.PBI_TENANT_ID }}
          PBI_CLIENT_ID:     ${{ secrets.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
          PBI_DATASET_ID:    ${{ secrets.PBI_DATASET_ID }}
        run: python fetch_data.py

      # Step 5 — Set up Node.js to build React app
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 6 — Install React dependencies
      - name: Install npm packages
        run: npm ci

      # Step 7 — Build the React app
      - name: Build dashboard
        run: npm run build

      # Step 8 — Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
