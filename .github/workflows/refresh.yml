name: Daily Dashboard Refresh

on:
  # Runs every day at 7:00 AM UTC
  schedule:
    - cron: '0 7 * * *'

  # Manual trigger button in GitHub Actions tab
  workflow_dispatch:
  
permissions:
  contents: write
  
jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 — Check out repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2 — Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3 — Install Python dependencies
      - name: Install dependencies
        run: pip install requests

      # Step 4 — Fetch live data from Power BI
      - name: Fetch live data from Power BI
        env:
          PBI_TENANT_ID:     ${{ secrets.PBI_TENANT_ID }}
          PBI_CLIENT_ID:     ${{ secrets.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
          PBI_DATASET_ID:    ${{ secrets.PBI_DATASET_ID }}
        run: python fetch_data.py

      # Step 5 — Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 6 — Install npm packages
      - name: Install npm packages
        run: npm ci

      # Step 7 — Build the React app
      - name: Build dashboard
        run: npm run build

      # Step 8 — Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
