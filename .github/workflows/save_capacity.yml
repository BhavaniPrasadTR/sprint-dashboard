name: Save Capacity Data

on:
  workflow_dispatch:
    inputs:
      capacity_json:
        description: "Capacity rows JSON array"
        required: true
        type: string

permissions:
  contents: write

jobs:
  save-capacity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Save capacity data
        env:
          PBI_TENANT_ID:     ${{ secrets.PBI_TENANT_ID }}
          PBI_CLIENT_ID:     ${{ secrets.PBI_CLIENT_ID }}
          PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
          PBI_DATASET_ID:    ${{ secrets.PBI_DATASET_ID }}
          CAPACITY_JSON:     ${{ github.event.inputs.capacity_json }}
        run: python save_capacity.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm packages
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
